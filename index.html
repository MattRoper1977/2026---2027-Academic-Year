<!DOCTYPE html>
<html lang="en-GB" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year Plan · Build · Grow · Launch</title>
<style>
:root{
  --green:#16a34a; --blue:#2563eb; --orange:#f97316; --purple:#7c3aed; --teal:#0d9488;
  --navy-dark:#0f1e33; --slate900:#0f172a;
  --bg:#f8fafc; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --border:#e2e8f0;
  --hero-blue:#3b9eff;
  --build:#2563eb; --grow:#16a34a; --launch:#f97316;
  --radius:16px; --ease:cubic-bezier(.22,1,.36,1); --ticker-bg:#16a34a;
  --shadow:0 16px 38px -22px rgba(15,30,55,.35);
}
[data-theme="dark"]{
  --bg:#0a1424; --card:#0f2138; --ink:#eaf1fb; --muted:#9fb2cc; --border:rgba(255,255,255,.09);
  --shadow:0 18px 40px -22px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
  line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ticker */
.ticker{width:100%;overflow:hidden;background:var(--ticker-bg);border-bottom:1px solid rgba(0,0,0,.12);position:relative;z-index:100}
.ticker-track{display:flex;white-space:nowrap;padding-left:100%;animation:marquee 30s linear infinite;color:#fff;
  font-weight:700;font-size:.82rem;letter-spacing:.07em;text-transform:uppercase;padding-top:11px;padding-bottom:11px}
.ticker:hover .ticker-track{animation-play-state:paused}
.ticker-text{display:flex;align-items:center;gap:22px;padding-right:48px}
.ticker-text b{opacity:.65}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* hero (always dark) */
.hero{position:relative;overflow:hidden;padding:30px 0 54px;color:#eaf1fb;
  background:radial-gradient(120% 130% at 88% -20%,rgba(59,158,255,.20),transparent 55%),
    radial-gradient(90% 120% at -5% 120%,rgba(22,163,74,.18),transparent 52%),
    linear-gradient(165deg,#16335a,var(--navy-dark) 70%)}
.hero::after{content:"";position:absolute;inset:0;opacity:.6;pointer-events:none;
  background:repeating-linear-gradient(118deg,transparent 0 42px,rgba(255,255,255,.02) 42px 43px)}
.hero-inner{max-width:1180px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.hero-top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:32px}
.eyebrow{display:inline-flex;align-items:center;gap:12px;font-size:.74rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--hero-blue)}
.eyebrow::before{content:"";width:28px;height:2px;background:var(--hero-blue);border-radius:2px}
.controls{display:flex;align-items:center;gap:10px}
.hublink{display:inline-flex;align-items:center;gap:8px;text-decoration:none;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.16);color:#eaf1fb;font-size:.84rem;font-weight:600;padding:9px 15px;border-radius:12px;transition:.2s var(--ease)}
.hublink:hover{background:rgba(255,255,255,.13);transform:translateY(-1px)}
.toggle{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.07);
  color:#eaf1fb;cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.2s var(--ease)}
.toggle:hover{background:rgba(255,255,255,.13);transform:translateY(-1px)}
.hero h1{font-size:clamp(40px,6.2vw,70px);font-weight:700;line-height:1.02;letter-spacing:-.022em}
.hero h1 b{color:var(--hero-blue)}
.hero p{max-width:600px;margin-top:16px;color:#9fb2cc;font-size:1.06rem}
.hero p b{color:#cfe0f5;font-weight:600}
.stats{display:flex;flex-wrap:wrap;gap:11px;margin-top:30px}
.stat{display:inline-flex;align-items:center;gap:9px;padding:10px 17px;border-radius:999px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.15);font-size:.86rem;font-weight:500;color:#eaf1fb}
.stat .ph{display:inline-flex;gap:4px}
.stat .ph i{width:9px;height:9px;border-radius:50%;display:inline-block}

/* container */
.wrap{max-width:1180px;margin:0 auto;padding:0 24px 80px}

/* phase sections */
.phase-sec{margin-top:42px}
.phase-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin:0 2px 18px;
  border-bottom:2px solid color-mix(in srgb,var(--accent) 32%,transparent);padding-bottom:12px}
.phase-head .num{font-size:.82rem;font-weight:700;color:var(--accent);letter-spacing:.12em}
.phase-head h2{font-size:1.75rem;font-weight:700;color:var(--accent);letter-spacing:-.015em}
.phase-head .blurb{color:var(--muted);font-size:.92rem;margin-left:auto}

/* folder cards */
.folders{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.folder{position:relative;text-align:left;cursor:pointer;overflow:hidden;padding:22px 20px 18px;border-radius:var(--radius);
  background:var(--card);border:1px solid var(--border);color:var(--ink);font-family:inherit;transition:.22s var(--ease);
  display:flex;flex-direction:column;gap:5px;min-height:150px;animation:rise .5s var(--ease) both}
.folder::before{content:"";position:absolute;left:0;top:0;height:4px;width:100%;background:var(--accent)}
.folder:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--accent) 50%,var(--border));box-shadow:var(--shadow)}
.folder:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.folder .ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:23px;margin-bottom:6px;
  background:color-mix(in srgb,var(--accent) 14%,transparent)}
.folder .fname{font-size:1.18rem;font-weight:700}
.folder .count{margin-top:auto;font-size:.78rem;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
.folder .count .chev{color:var(--accent);font-size:1.1rem;line-height:1;transition:.2s var(--ease)}
.folder:hover .count .chev{transform:translateX(3px)}

/* view banner (folder view) */
.banner{position:relative;overflow:hidden;color:#eaf1fb;padding:26px 0 30px;background:linear-gradient(160deg,#16335a,var(--navy-dark) 75%)}
.banner::after{content:"";position:absolute;inset:0;opacity:.55;pointer-events:none;
  background:repeating-linear-gradient(118deg,transparent 0 42px,rgba(255,255,255,.02) 42px 43px)}
.banner-inner{max-width:1180px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.banner-top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}
.back{display:inline-flex;align-items:center;gap:8px;font-size:.86rem;font-weight:600;color:#9fb2cc;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14);cursor:pointer;font-family:inherit;padding:8px 14px;border-radius:11px;transition:.18s var(--ease)}
.back:hover{color:#fff;background:rgba(255,255,255,.13);gap:11px}
.banner .crumb{font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent2)}
.banner h2{font-size:1.95rem;font-weight:700;letter-spacing:-.015em;display:flex;align-items:center;gap:13px;margin-top:4px}
.banner h2 .ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:23px;
  background:color-mix(in srgb,var(--accent) 26%,transparent)}
.banner .st{color:#9fb2cc;font-size:.95rem;margin-top:6px}

/* item list */
.items{display:flex;flex-direction:column;gap:10px;margin-top:24px}
.item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;animation:rise .4s var(--ease) both}
.item .fic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0;
  background:color-mix(in srgb,var(--accent2) 16%,transparent)}
.item .meta{flex:1;min-width:0}
.item .title{font-weight:600;font-size:.98rem}
.item .tag{display:inline-block;margin-top:3px;font-size:.68rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--accent2);background:color-mix(in srgb,var(--accent2) 13%,transparent);padding:3px 9px;border-radius:999px}
.item .open{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;font-weight:600;text-decoration:none;color:#fff;
  background:var(--accent2);padding:8px 14px;border-radius:10px;transition:.18s var(--ease);flex-shrink:0}
.item .open:hover{filter:brightness(1.07);transform:translateX(2px)}
.item .pending{font-size:.78rem;font-weight:500;color:var(--muted);border:1.5px dashed var(--border);padding:8px 13px;border-radius:10px;flex-shrink:0}

/* empty */
.empty{text-align:center;padding:54px 30px;border-radius:var(--radius);margin-top:24px;border:1.5px dashed var(--border);background:var(--card)}
.empty .em-ic{width:60px;height:60px;border-radius:15px;display:grid;place-items:center;font-size:30px;margin:0 auto 16px;
  background:color-mix(in srgb,var(--accent2) 14%,transparent)}
.empty h3{font-size:1.28rem;font-weight:700;margin-bottom:10px}
.empty p{color:var(--muted);max-width:460px;margin:0 auto;font-size:.95rem}
.empty code{background:color-mix(in srgb,var(--ink) 7%,transparent);padding:2px 7px;border-radius:6px;font-size:.86em}

.foot{max-width:1180px;margin:36px auto 0;padding:22px 24px;border-top:1px solid var(--border);color:var(--muted);
  font-size:.84rem;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:760px){
  .hero{padding:24px 0 40px}
  .hero-top,.banner-top{flex-wrap:wrap}
  .folders{grid-template-columns:1fr}
  .phase-head .blurb{margin-left:0;width:100%}
  .item{flex-wrap:wrap}
}
</style>
</head>
<body>

<div class="ticker" aria-hidden="true">
  <div class="ticker-track">
    <span class="ticker-text">Year Plan 2026–27 <b>·</b> Build → Grow → Launch <b>·</b> Plans · Slideshows · Resources <b>·</b> Open a folder to begin</span>
    <span class="ticker-text">Year Plan 2026–27 <b>·</b> Build → Grow → Launch <b>·</b> Plans · Slideshows · Resources <b>·</b> Open a folder to begin</span>
  </div>
</div>

<main id="app"></main>

<footer class="foot">
  <span>Year Plan 2026–27 · Build · Grow · Launch</span>
  <span>Progress Schools · Tees Valley</span>
</footer>

<script>
/* ============================================================
   PLAN DATA — edit here to fill the year.
   Structure: phase (build/grow/launch) → folder (plans/slideshows/resources) → items[]
   Each item: { title, subject, href }
     • href "Launch/Art_L1_....html"  -> opens that file (relative to this page)
     • href ""                         -> shows as "To plan"
   ============================================================ */
const PLAN = {
  year:"2026–27",
  phases:[
    { id:"build", name:"Build", num:"01", blurb:"Introduce — lay the foundations", accent:"#2563eb",
      folders:{ plans:[], slideshows:[], resources:[] } },

    { id:"grow", name:"Grow", num:"02", blurb:"Develop — build skill and depth", accent:"#16a34a",
      folders:{ plans:[], slideshows:[], resources:[] } },

    { id:"launch", name:"Launch", num:"03", blurb:"Apply — show what they can do", accent:"#f97316",
      folders:{
        plans:[
          { title:"Art L1 · Colours, Lines, Like Me", subject:"Art", href:"Launch/Art_L1_Colours_Lines_Like_Me_v5.html" },
          { title:"Art L2 · My Identity Picture",      subject:"Art", href:"Launch/Art_L2_My_Identity_Picture_v5.html" }
        ],
        slideshows:[],
        resources:[]
      } }
  ]
};

const FOLDERS=[
  { id:"plans",      name:"Plans",      icon:"📋", fileIcon:"📄" },
  { id:"slideshows", name:"Slideshows", icon:"🖥️", fileIcon:"🖼️" },
  { id:"resources",  name:"Resources",  icon:"🧰", fileIcon:"📦" }
];

/* ---------- controls ---------- */
function controls(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  return `<div class="controls">
      <a class="hublink" href="https://mattroper1977.github.io/Lessons/" target="_blank" rel="noopener">Lesson Hub ↗</a>
      <button class="toggle" id="themeBtn" aria-label="Toggle light and dark">${dark?'☀️':'🌙'}</button>
    </div>`;
}
function bindControls(){
  const b=document.getElementById('themeBtn'); if(!b) return;
  b.addEventListener('click',()=>{
    const r=document.documentElement;
    r.setAttribute('data-theme', r.getAttribute('data-theme')==='dark'?'light':'dark');
    b.textContent=r.getAttribute('data-theme')==='dark'?'☀️':'🌙';
  });
}

/* ---------- home ---------- */
function showHome(){
  const sections=PLAN.phases.map(p=>{
    const cards=FOLDERS.map(f=>{
      const n=p.folders[f.id].length;
      const count=n?`${n} item${n>1?'s':''}`:"Empty · ready";
      return `<button class="folder" style="--accent:${p.accent}" data-phase="${p.id}" data-folder="${f.id}">
          <span class="ic">${f.icon}</span>
          <span class="fname">${f.name}</span>
          <span class="count"><span>${count}</span><span class="chev">›</span></span>
        </button>`;
    }).join("");
    return `<section class="phase-sec" style="--accent:${p.accent}">
        <div class="phase-head"><span class="num">${p.num}</span><h2>${p.name}</h2><span class="blurb">${p.blurb}</span></div>
        <div class="folders">${cards}</div>
      </section>`;
  }).join("");

  document.getElementById('app').innerHTML=`
    <section class="hero">
      <div class="hero-inner">
        <div class="hero-top"><div class="eyebrow">Matt's Apps · Year Planner</div>${controls()}</div>
        <h1>Year <b>Plan</b></h1>
        <p>Three phases for the whole year — <b>Build</b>, <b>Grow</b> and <b>Launch</b>. Open a folder inside any phase to reach its <b>plans</b>, <b>slideshows</b> and <b>resources</b>.</p>
        <div class="stats">
          <span class="stat">🧱 3 phases</span>
          <span class="stat">📁 9 folders</span>
          <span class="stat"><span class="ph"><i style="background:var(--build)"></i><i style="background:var(--grow)"></i><i style="background:var(--launch)"></i></span> Build · Grow · Launch</span>
        </div>
      </div>
    </section>
    <div class="wrap">${sections}</div>`;

  document.querySelectorAll('.folder').forEach(c=>c.addEventListener('click',()=>showFolder(c.dataset.phase,c.dataset.folder)));
  bindControls();
  window.scrollTo({top:0,behavior:'instant'});
}

/* ---------- folder view ---------- */
function showFolder(phaseId,folderId){
  const p=PLAN.phases.find(x=>x.id===phaseId);
  const f=FOLDERS.find(x=>x.id===folderId);
  if(!p||!f) return showHome();
  const items=p.folders[folderId];

  const list=items.length
    ? `<div class="items">${items.map(it=>{
        const action=it.href&&it.href.trim()
          ? `<a class="open" href="${it.href}" target="_blank" rel="noopener">Open →</a>`
          : `<span class="pending">To plan</span>`;
        const tag=it.subject?`<span class="tag">${it.subject}</span>`:"";
        return `<div class="item">
            <span class="fic">${f.fileIcon}</span>
            <span class="meta"><span class="title">${it.title}</span><br>${tag}</span>
            ${action}
          </div>`;
      }).join("")}</div>`
    : `<div class="empty">
         <div class="em-ic">${f.icon}</div>
         <h3>No ${f.name.toLowerCase()} in ${p.name} yet</h3>
         <p>Add items to <code>${p.name} → ${f.name}</code> in the plan data, or drop matching files into <code>${p.name}/${f.name}/</code> in the repo and link them here.</p>
       </div>`;

  document.getElementById('app').innerHTML=`
    <section class="banner" style="--accent:${p.accent};--accent2:${p.accent}">
      <div class="banner-inner">
        <div class="banner-top"><button class="back" id="backBtn">← All phases</button>${controls()}</div>
        <div class="crumb">${p.name}</div>
        <h2><span class="ic">${f.icon}</span>${f.name}</h2>
        <div class="st">${p.blurb} · ${PLAN.year}</div>
      </div>
    </section>
    <div class="wrap" style="--accent2:${p.accent}">${list}</div>`;

  document.getElementById('backBtn').addEventListener('click',showHome);
  bindControls();
  window.scrollTo({top:0,behavior:'instant'});
}

/* init — after data + functions defined */
showHome();
</script>
</body>
</html>
